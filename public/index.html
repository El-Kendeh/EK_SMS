<!DOCTYPE html>

    <!-- Security Headers -->
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <!-- Note: frame-ancestors and X-Frame-Options directives are sent via HTTP headers only -->
    <!-- CSP meta tag: includes only directives supported in meta tags -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://embed.tawk.to https://*.tawk.to https://vercel.live chrome-extension:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://*.tawk.to; img-src 'self' data: https: http://localhost:8000 http://localhost:3000; font-src 'self' https://fonts.gstatic.com https://*.tawk.to; media-src 'self' data:; connect-src 'self' http://localhost:8000 http://web:8000 https://ek-sms-backend.onrender.com https://backend.pruhsms.africa https://pruhsms.africa https://*.tawk.to wss://*.tawk.to https://vercel.live https://*.vercel.app wss://*.pusher.com wss://ws-us3.pusher.com https://*.pusher.com; frame-src https://tawk.to https://*.tawk.to https://vercel.live; base-uri 'self'; form-action 'self'" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <!-- X-Content-Type-Options, X-Frame-Options, and X-XSS-Protection are sent via HTTP headers -->
    
    <!-- CSRF Token Meta Tag -->
    <meta name="csrf-token" content="" />
    
    <!-- Fonts: Lexend (landing) + Manrope + Inter (school admin dashboard) + Material Symbols -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&family=Manrope:wght@400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <!-- Material Symbols — variable fonts (CDN primary, local TTF fallback) -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <style>
      /* Local font fallback for offline environments */
      @font-face {
        font-family: 'Material Symbols Outlined';
        font-style: normal;
        font-weight: 100 700;
        font-display: swap;
        src: url('/fonts/MaterialSymbolsOutlined.ttf') format('truetype');
      }
      /* Shared icon class properties */
      .material-symbols-outlined,
      .material-symbols-rounded {
        font-weight: normal;
        font-style: normal;
        font-size: 24px;
        line-height: 1;
        letter-spacing: normal;
        text-transform: none;
        display: inline-block;
        white-space: nowrap;
        word-wrap: normal;
        direction: ltr;
        -webkit-font-feature-settings: 'liga';
        font-feature-settings: 'liga';
        -webkit-font-smoothing: antialiased;
        text-rendering: optimizeLegibility;
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        -webkit-user-select: none;
        user-select: none;
      }
      .material-symbols-outlined {
        font-family: 'Material Symbols Outlined';
      }
      .material-symbols-rounded {
        font-family: 'Material Symbols Rounded';
      }
    </style>

    <!-- App Manifest -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    
    <title>EK-SMS</title>
