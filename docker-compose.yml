services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILDKIT_INLINE_CACHE: 1
    container_name: ek-sms-backend
    ports:
      - "8000:8000"
    environment:
      DEBUG: 'True'
      SECRET_KEY: django-insecure-dev-key-for-development-only
      ALLOWED_HOSTS: localhost,127.0.0.1,backend.pruhsms.africa,pruhsms.africa
      CORS_ALLOWED_ORIGINS: https://backend.pruhsms.africa,https://pruhsms.africa,https://www.pruhsms.africa,https://ek-sms-one.vercel.app
      SECURE_SSL_REDIRECT: 'True'
      SESSION_COOKIE_SECURE: 'True'
      CSRF_COOKIE_SECURE: 'True'
      SECURE_HSTS_SECONDS: '31536000'
      DB_ENGINE: sqlite
    volumes:
      - ./eksms:/app/eksms
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - ek-sms-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        BUILDKIT_INLINE_CACHE: 1
        NODE_OPTIONS: "--max_old_space_size=2048"
    container_name: ek-sms-frontend
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: https://backend.pruhsms.africa
      REACT_APP_API_HOST: http://web:8000
      NODE_ENV: production
    depends_on:
      - web
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - ek-sms-network

networks:
  ek-sms-network:
    driver: bridge
